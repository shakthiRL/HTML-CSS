<!DOCTYPE html>
<html>
    <head>
        <title>Registration Form</title>
        <link rel="stylesheet" href="style1.css">
    </head>
    <body>
        
        <div class="container">
            <h2>Registration Form</h2>
                   <form action="#" method="post">
            <div class="row">
                <div class="input">
                    <label>First Name</label>
                    <input type="text" class="in" required>
                </div>
                <div class="input">
                    <label>Last Name</label>
                    <input type="text" class="in" required>
                </div>
            </div>
            <label>Gender</label>
            <div class="Gender">
                <input type="radio" name="Gender">Male
                <input type="radio" name="Gender">Female
                <input type="radio" name="Gender">Prefer not to say
            </div>
            <lable>Email</lable>
            <input type="email" class="in" required>
            <label>password</label>
            <input type="password" class="in" required>
            <label>Confrim password</label>
            <input type="password" class="in" required>

            <div class="row">
                <div class="input">
                    <label>Phone</label>
                    <input type="tel" class="in">
                </div>
                <div class="input">
                    <label>DOB</label>
                    <input type="date" class="in">
                </div>
            </div>
            <label>Hobby</label>
            <div class="Hobby">
                <input type="checkbox">Music
                <input type="checkbox">Drawing
                <input type="checkbox">Painting
            </div>
            <div class="buttons">
                <button type="reset">Reset</button>
                <button type="submit">Submit</button>
            </div>
        </form>
        </div>
    </body>
</html>
